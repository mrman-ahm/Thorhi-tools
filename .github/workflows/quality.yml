name: Quality

on:
  pull_request:
  push:
    branches: [main, phase-6-7-production-homepage]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run lint
      - name: Run strict TypeScript
        run: npm run typecheck 2>&1 | tee typecheck.log
      - name: Run unit contracts
        run: npm test 2>&1 | tee unit-test.log
      - name: Run production build
        run: npm run build 2>&1 | tee build.log
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Upload browser validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: homepage-browser-validation
          path: |
            typecheck.log
            unit-test.log
            build.log
            test-results/results.json
            test-results/**/*.png
            test-results/**/error-context.md
          if-no-files-found: ignore
          retention-days: 14
