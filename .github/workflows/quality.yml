name: Quality

on:
  pull_request:
  push:
    branches: [main, phase-6-7-production-homepage]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Upload browser validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: homepage-browser-validation
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
